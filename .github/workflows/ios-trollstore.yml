name: iOS TrollStore Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install Raylib for iOS
        run: |
          git clone --depth 1 https://github.com/raysan5/raylib.git
          cd raylib/src

          # Patch 1: Replace Linux GLES2 paths with iOS OpenGLES framework paths
          sed -i '' 's|#include <GLES2/gl2.h>|#include <OpenGLES/ES2/gl.h>|g' rlgl.h
          sed -i '' 's|#include <GLES2/gl2ext.h>|#include <OpenGLES/ES2/glext.h>|g' rlgl.h

          # Patch 2: Write a compat header for OES typedefs removed from iOS 12+ SDK
          printf '%s\n' \
            '#pragma once' \
            '/* OES typedefs removed from iOS 12+ SDK */' \
            '#if defined(__APPLE__) && !defined(PFNGLGENVERTEXARRAYSOESPROC)' \
            'typedef void (*PFNGLGENVERTEXARRAYSOESPROC)(int n, unsigned int* a);' \
            'typedef void (*PFNGLBINDVERTEXARRAYOESPROC)(unsigned int a);' \
            'typedef void (*PFNGLDELETEVERTEXARRAYSOESPROC)(int n, const unsigned int* a);' \
            'typedef void (*PFNGLDRAWARRAYSINSTANCEDEXTPROC)(unsigned int m, int f, int c, int p);' \
            'typedef void (*PFNGLDRAWELEMENTSINSTANCEDEXTPROC)(unsigned int m, int c, unsigned int t, const void* i, int p);' \
            'typedef void (*PFNGLVERTEXATTRIBDIVISOREXTPROC)(unsigned int i, unsigned int d);' \
            '#endif' \
            > ios_oes_compat.h

          # Patch rlgl.h: include the compat header right after glext.h
          sed -i '' 's|#include <OpenGLES/ES2/glext.h>|#include <OpenGLES/ES2/glext.h>\'$'\n''#include "ios_oes_compat.h"|g' rlgl.h

          # Build: Compile each Raylib source file manually with xcrun
          # CMake/Make cannot target iOS (not in Raylib master PLATFORM list)
          CC="xcrun --sdk iphoneos clang"
          CFLAGS="-arch arm64 -mios-version-min=16.0 -DPLATFORM_IOS -DGRAPHICS_API_OPENGL_ES2 -DGLES_SILENCE_DEPRECATION -Wno-missing-braces -Wno-deprecated-declarations -fno-strict-aliasing -std=c99 -I."

          for src in rcore.c rshapes.c rtextures.c rtext.c rmodels.c raudio.c utils.c; do
            echo "Compiling $src..."
            $CC $CFLAGS -c $src -o ${src%.c}.o
          done

          # Package into static library
          xcrun --sdk iphoneos ar rcs libraylib.a *.o
          xcrun --sdk iphoneos ranlib libraylib.a

          # Copy output to project root
          cd ../../
          mkdir -p lib/ios
          cp raylib/src/libraylib.a lib/ios/
          cp raylib/src/raylib.h src/
          cp raylib/src/raymath.h src/
          cp raylib/src/rlgl.h src/

      - name: Build XDJ-UNX-C for iOS
        run: |
          make -f ios/Makefile.ios -j$(sysctl -n hw.ncpu)

      - name: Package App Bundle
        run: |
          mkdir -p XDJUNX.app
          cp xdjunx XDJUNX.app/
          cp ios/Info.plist XDJUNX.app/
          cp -r assets XDJUNX.app/

      - name: Create IPA for TrollStore
        run: |
          mkdir -p Payload
          cp -r XDJUNX.app Payload/
          zip -v -r XDJUNX_TrollStore.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: XDJUNX_TrollStore_IPA
          path: XDJUNX_TrollStore.ipa
