name: iOS TrollStore Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install Raylib for iOS
        run: |
          git clone --depth 1 https://github.com/raysan5/raylib.git
          cd raylib

          # Patch rlgl.h to use iOS OpenGLES headers (Raylib master still uses Linux GLES2 paths)
          sed -i '' 's|#include <GLES2/gl2.h>|#include <OpenGLES/ES2/gl.h>|g' src/rlgl.h
          sed -i '' 's|#include <GLES2/gl2ext.h>|#include <OpenGLES/ES2/glext.h>|g' src/rlgl.h

          # Download ios-cmake toolchain - the canonical way to tell CMake to target iOS device
          curl -L https://raw.githubusercontent.com/leetal/ios-cmake/master/ios.toolchain.cmake \
               -o ios.toolchain.cmake

          mkdir build && cd build

          # OS64 = arm64 physical iOS device (iPhone 8 Plus)
          cmake .. -G Xcode \
                   -DCMAKE_TOOLCHAIN_FILE=../ios.toolchain.cmake \
                   -DPLATFORM=OS64 \
                   -DBUILD_SHARED_LIBS=OFF \
                   -DGRAPHICS=GRAPHICS_API_OPENGL_ES2 \
                   -DBUILD_EXAMPLES=OFF

          # Build only the raylib target, no code signing needed for our workflow
          xcodebuild -project raylib.xcodeproj \
                     -scheme raylib \
                     -sdk iphoneos \
                     -configuration Release \
                     -arch arm64 \
                     clean build \
                     CODE_SIGNING_ALLOWED=NO

          # Create lib/ios directory
          cd ../../
          mkdir -p lib/ios

          # Find and copy the built static library
          find raylib/build -name "libraylib.a" -exec cp {} lib/ios/ \;

          # Copy headers for the main project build
          cp raylib/src/raylib.h src/
          cp raylib/src/raymath.h src/
          cp raylib/src/rlgl.h src/

      - name: Build XDJ-UNX-C for iOS
        run: |
          make -f ios/Makefile.ios -j$(sysctl -n hw.ncpu)

      - name: Package App Bundle
        run: |
          # Create .app directory
          mkdir -p XDJUNX.app
          # Move binary
          cp xdjunx XDJUNX.app/
          # Copy Info.plist
          cp ios/Info.plist XDJUNX.app/
          # Copy Assets (adjust paths if necessary)
          cp -r assets XDJUNX.app/
          # Copy any .dll or required files if they were converted to static/bundled
          # (Raylib projects usually bundle everything)

      - name: Create IPA for TrollStore
        run: |
          mkdir -p Payload
          cp -r XDJUNX.app Payload/
          zip -v -r XDJUNX_TrollStore.ipa Payload
          # Optional: Sign with ldid for "fake-sign" if some TrollStore versions prefer it
          # (Usually not needed for modern TrollStore)

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: XDJUNX_TrollStore_IPA
          path: XDJUNX_TrollStore.ipa
