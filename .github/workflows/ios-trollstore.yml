name: iOS TrollStore Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install Raylib for iOS
        run: |
          git clone --depth 1 https://github.com/raysan5/raylib.git
          
          # Build raylib static library using the official Xcode project
          # This is the most reliable way as it handles all iOS SDK headers and architectures correctly
          xcodebuild -project raylib/projects/Xcode/raylib.xcodeproj \
                     -scheme raylib \
                     -sdk iphoneos \
                     -configuration Release \
                     -arch arm64 \
                     clean build
          
          # Create lib/ios directory in the project root
          mkdir -p lib/ios
          
          # Find and copy the built static library (path might vary slightly pending Xcode version)
          # We look for libraylib.a in the DerivedData or build folder
          find raylib/projects/Xcode/build -name "libraylib.a" -exec cp {} lib/ios/ \;
          
          # Copy headers to src/ for the main project build
          cp raylib/src/raylib.h src/
          cp raylib/src/raymath.h src/
          cp raylib/src/rlgl.h src/

      - name: Build XDJ-UNX-C for iOS
        run: |
          make -f ios/Makefile.ios -j$(sysctl -n hw.ncpu)

      - name: Package App Bundle
        run: |
          # Create .app directory
          mkdir -p XDJUNX.app
          # Move binary
          cp xdjunx XDJUNX.app/
          # Copy Info.plist
          cp ios/Info.plist XDJUNX.app/
          # Copy Assets (adjust paths if necessary)
          cp -r assets XDJUNX.app/
          # Copy any .dll or required files if they were converted to static/bundled
          # (Raylib projects usually bundle everything)

      - name: Create IPA for TrollStore
        run: |
          mkdir -p Payload
          cp -r XDJUNX.app Payload/
          zip -v -r XDJUNX_TrollStore.ipa Payload
          # Optional: Sign with ldid for "fake-sign" if some TrollStore versions prefer it
          # (Usually not needed for modern TrollStore)

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: XDJUNX_TrollStore_IPA
          path: XDJUNX_TrollStore.ipa
