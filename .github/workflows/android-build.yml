name: Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Detect and pin a single NDK version shared across all build steps
      - name: Set NDK Path
        run: |
          # Detect the highest NDK version installed on the runner
          NDK_ROOT=$(ls -d $ANDROID_HOME/ndk/*/ 2>/dev/null | sort -V | tail -n 1)
          NDK_ROOT="${NDK_ROOT%/}"  # Strip trailing slash
          echo "NDK_PATH=$NDK_ROOT" >> $GITHUB_ENV
          echo "Pinned NDK: $NDK_ROOT"

      - name: Build Raylib for Android (ARM64)
        run: |
          git clone --depth 1 https://github.com/raysan5/raylib.git
          cd raylib/src

          # Force Raylib to use the SAME pinned NDK via ANDROID_NDK_ROOT
          # Also set ANDROID_NDK so Raylib's Makefile fallback picks it up
          export ANDROID_NDK_ROOT="${{ env.NDK_PATH }}"
          export ANDROID_NDK="${{ env.NDK_PATH }}"

          make PLATFORM=PLATFORM_ANDROID \
               ANDROID_ARCH=arm64 \
               ANDROID_API_VERSION=26 \
               ANDROID_NDK_ROOT="${{ env.NDK_PATH }}" \
               RAYLIB_LIBTYPE=STATIC \
               -j$(nproc)

          cd ../../
          mkdir -p lib/android/arm64-v8a
          cp raylib/src/libraylib.a lib/android/arm64-v8a/

          # Copy headers to src/ for the project build
          cp raylib/src/raylib.h src/
          cp raylib/src/raymath.h src/
          cp raylib/src/rlgl.h src/

      - name: Generate Asset Bundle Header
        run: |
          # Compile bin2c tool natively on Linux
          gcc tools/bin2c.c -o tools/bin2c

          # Generate assets_bundle.h (same logic as build.bat)
          BUNDLE_H="src/ui/components/assets_bundle.h"
          echo "#ifndef ASSETS_BUNDLE_H" > "$BUNDLE_H"
          echo "#define ASSETS_BUNDLE_H" >> "$BUNDLE_H"

          ./tools/bin2c "assets/fonts/otfs/Font Awesome 5 Free-Solid-900.otf"   "$BUNDLE_H" font_awesome_solid
          ./tools/bin2c "assets/fonts/otfs/Font Awesome 5 Free-Regular-400.otf"  "$BUNDLE_H" font_awesome_regular
          ./tools/bin2c "assets/fonts/otfs/Font Awesome 5 Brands-Regular-400.otf" "$BUNDLE_H" font_awesome_brand
          ./tools/bin2c "assets/images/Pioneer.png"                               "$BUNDLE_H" pioneer_logo

          echo "#endif" >> "$BUNDLE_H"
          echo "assets_bundle.h generated successfully."

      - name: Build XDJ-UNX-C Native Library
        run: |
          # Pass same NDK path to Makefile.android via ANDROID_NDK_ROOT
          make -f android/Makefile.android \
               ANDROID_NDK_ROOT=${{ env.NDK_PATH }} \
               -j$(nproc)

      - name: Package APK
        run: |
          # Get the latest build-tools version installed
          BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools | sort -V | tail -n 1)
          AAPT2=$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/aapt2
          echo "Using build-tools: $BUILD_TOOLS_VERSION"

          # Get the highest installed platform jar
          PLATFORM_JAR=$(ls -d $ANDROID_HOME/platforms/android-* | sort -V | tail -n 1)
          echo "Using platform: $PLATFORM_JAR"

          # Prepare APK directory structure
          mkdir -p apk_staging/lib/arm64-v8a
          mkdir -p apk_staging/assets

          # Copy native library
          cp libmain.so apk_staging/lib/arm64-v8a/

          # Copy assets folder
          cp -r assets/* apk_staging/assets/

          # Create unsigned APK using aapt2: link manifest + platform jar
          $AAPT2 link \
            --manifest android/AndroidManifest.xml \
            -I "$PLATFORM_JAR/android.jar" \
            -o xdjunx-unsigned.apk \
            --auto-add-overlay

          # Add lib/ and assets/ into the APK (APK is a ZIP)
          cd apk_staging
          zip -v -r ../xdjunx-unsigned.apk lib assets
          cd ..

      - name: Sign & Align APK
        run: |
          BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools | sort -V | tail -n 1)
          ZIPALIGN=$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/zipalign
          APKSIGNER=$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner

          # Zipalign for optimal memory mapping
          $ZIPALIGN -v 4 xdjunx-unsigned.apk xdjunx-aligned.apk

          # Generate a debug keystore for CI signing
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" \
            -storepass android -keypass android

          # Sign the APK
          $APKSIGNER sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out xdjunx.apk \
            xdjunx-aligned.apk

          echo "APK signed successfully."

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: XDJ-UNX-Android-APK
          path: xdjunx.apk
