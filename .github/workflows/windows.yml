name: Windows Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.11.0

      - name: Build with build.bat
        shell: cmd
        run: |
          set ZIG=zig
          build.bat windows

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xdjunx-windows-x64
          path: build/windows/
