name: Linux ARM64 Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.11.0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxcursor-dev libxinerama-dev \
                                 libxrandr-dev libxi-dev libgl1-mesa-dev \
                                 libwayland-dev libxkbcommon-dev wayland-protocols

      - name: Build DRM Backend
        run: |
          chmod +x build.sh tools/build_raylib.sh
          export ZIG=zig
          ./tools/build_raylib.sh drm
          ./build.sh drm

      - name: Build Desktop (Wayland/X11) Backend
        run: |
          export ZIG=zig
          ./tools/build_raylib.sh desktop
          ./build.sh desktop

      - name: Upload DRM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xdjunx-linux-arm64-drm
          path: build/linux_drm/xdjunx

      - name: Upload Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xdjunx-linux-arm64-desktop
          path: build/linux_desktop/xdjunx
