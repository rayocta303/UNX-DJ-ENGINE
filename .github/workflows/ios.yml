name: iOS Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Zig
      uses: mlugg/setup-zig@v1
      with:
        zig-version: 0.11.0

    - name: Checkout Raylib
      run: |
        git clone https://github.com/raysan5/raylib.git raylib-src
        cd raylib-src
        git checkout 5.0

    - name: Build Raylib for iOS (arm64)
      run: |
        cd raylib-src/src
        # We use the official iOS SDK provided by the macOS runner
        # PLATFORM_IOS uses the internal iOS AppController.m/h
        make PLATFORM=PLATFORM_IOS IOS_SDK=iphoneos
        mkdir -p ../../platform/ios/libs
        cp libraylib.a ../../platform/ios/libs/

    - name: Bundle Assets
      run: |
        gcc tools/bin2c.c -o tools/bin2c
        gcc tools/gen_splash_bundle.c -o tools/gen_splash_bundle
        rm -f src/ui/components/assets_bundle.h
        echo "#ifndef ASSETS_BUNDLE_H" > src/ui/components/assets_bundle.h
        echo "#define ASSETS_BUNDLE_H" >> src/ui/components/assets_bundle.h
        ./tools/bin2c "assets/fonts/otfs/Font Awesome 5 Free-Solid-900.otf" src/ui/components/assets_bundle.h font_awesome_solid append
        ./tools/bin2c "assets/fonts/otfs/Font Awesome 5 Free-Regular-400.otf" src/ui/components/assets_bundle.h font_awesome_regular append
        ./tools/bin2c "assets/fonts/otfs/Font Awesome 5 Brands-Regular-400.otf" src/ui/components/assets_bundle.h font_awesome_brand append
        ./tools/bin2c "assets/splash.png" src/ui/components/assets_bundle.h unx_logo append
        ./tools/bin2c "assets/icons/crown.png" src/ui/components/assets_bundle.h icon_crown append
        ./tools/gen_splash_bundle assets/splash src/ui/components/splash_bundle_tmp.h
        cat src/ui/components/splash_bundle_tmp.h >> src/ui/components/assets_bundle.h
        echo "#endif" >> src/ui/components/assets_bundle.h

    - name: Compile XDJ-UNX for iOS
      run: |
        SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        mkdir -p build/ios/obj
        
        # Define source files lists (matches build.bat but excludes Windows-specific)
        C_FILES="src/main.c src/ui/components/theme.c src/ui/components/fonts.c src/ui/components/helpers.c src/ui/views/topbar.c src/ui/views/info.c src/ui/views/splash.c src/ui/views/settings.c src/ui/views/about.c src/ui/views/mixer.c src/ui/player/bottomstrip.c src/ui/player/beatfx.c src/ui/player/deckinfo.c src/ui/player/deckstrip.c src/ui/player/waveform.c src/ui/player/player.c src/audio/engine.c src/input/keyboard.c src/ui/browser/browser.c src/core/audio_backend.c src/core/logic/quantize.c src/core/logic/sync.c src/core/logic/settings_io.c src/core/logic/control_object.c src/core/midi/midi_handler.c src/core/midi/midi_mapper.c \
                 src/engine/fx/dsp_utils.c src/engine/fx/colorfx/space.c src/engine/fx/colorfx/dub_echo.c src/engine/fx/colorfx/sweep.c src/engine/fx/colorfx/noise.c src/engine/fx/colorfx/crush.c src/engine/fx/colorfx/filter.c src/engine/fx/colorfx/colorfx_manager.c \
                 src/engine/fx/beatfx/delay.c src/engine/fx/beatfx/echo.c src/engine/fx/beatfx/pingpong.c src/engine/fx/beatfx/spiral.c src/engine/fx/beatfx/roll.c src/engine/fx/beatfx/sliproll.c src/engine/fx/beatfx/reverb.c src/engine/fx/beatfx/helix.c src/engine/fx/beatfx/flanger.c src/engine/fx/beatfx/phaser.c src/engine/fx/beatfx/bfilter.c src/engine/fx/beatfx/trans.c src/engine/fx/beatfx/pitch.c src/engine/fx/beatfx/vinylbrake.c src/engine/fx/beatfx/beatfx_manager.c"
        
        CPP_FILES="lib/kaitai/kaitai/kaitaistream.cpp lib/rekordbox-metadata/rekordbox_anlz.cpp lib/rekordbox-metadata/rekordbox_pdb.cpp lib/serato/serato_parser.cpp lib/serato/serato_waveform.cpp src/library/rekordbox_reader.cpp src/library/serato_reader.cpp src/engine/util/engine_math.cpp"
        
        # Compile C
        for f in $C_FILES; do
           obj="build/ios/obj/$(echo $f | tr '/' '_').o"
           echo "Compiling $f -> $obj"
           clang -target arm64-apple-ios14.0 -isysroot $SDK_PATH -Isrc -Isrc/core -Isrc/engine -Ilib -Iraylib-src/src -O2 -DPLATFORM_IOS -DKS_STR_ENCODING_NONE -c $f -o $obj
        done
        
        # Compile C++
        for f in $CPP_FILES; do
           obj="build/ios/obj/$(echo $f | tr '/' '_').o"
           echo "Compiling $f -> $obj"
           clang++ -target arm64-apple-ios14.0 -isysroot $SDK_PATH -Isrc -Isrc/core -Isrc/engine -Ilib -Ilib/kaitai -Ilib/rekordbox-metadata -Iraylib-src/src -O2 -DPLATFORM_IOS -std=c++17 -c $f -o $obj
        done
        
        # Link executable
        clang++ -target arm64-apple-ios14.0 -isysroot $SDK_PATH \
          build/ios/obj/*.o \
          platform/ios/libs/libraylib.a \
          -framework UIKit -framework QuartzCore -framework CoreGraphics -framework CoreAudio -framework AudioToolbox -framework AVFoundation -framework CoreFoundation -framework OpenGLES \
          -o build/ios/xdjunx

    - name: Package IPA
      run: |
        mkdir -p Payload/xdjunx.app
        cp build/ios/xdjunx Payload/xdjunx.app/
        cp platform/ios/Info.plist Payload/xdjunx.app/
        mkdir -p Payload/xdjunx.app/assets
        cp -r assets/* Payload/xdjunx.app/assets/
        
        # Create dummy icons if they don't exist
        touch Payload/xdjunx.app/Icon.png
        
        zip -r xdjunx-unsigned.ipa Payload
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: XDJ-UNX-iOS-Unsigned
        path: xdjunx-unsigned.ipa
