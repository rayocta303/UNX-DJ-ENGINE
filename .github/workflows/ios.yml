name: iOS Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Zig
      uses: mlugg/setup-zig@v1
      with:
        version: 0.11.0

    - name: Checkout Raylib
      run: |
        git clone https://github.com/raysan5/raylib.git raylib-src
        cd raylib-src
        git checkout 5.0

    - name: Build Raylib for iOS (arm64)
      run: |
        SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        cd raylib-src/src
        # Fix the include path for OpenGL ES on iOS
        sed -i '' 's|<GLES2/gl2.h>|<OpenGLES/ES2/gl.h>|g' rlgl.h
        sed -i '' 's|<GLES2/glext.h>|<OpenGLES/ES2/glext.h>|g' rlgl.h
        
        # Explicitly passing SDK path and architecture to the Makefile
        make PLATFORM=PLATFORM_IOS IOS_SDK=iphoneos RAYLIB_LIBTYPE=STATIC GRAPHICS=GRAPHICS_API_OPENGL_ES2 \
             CC=clang CFLAGS="-isysroot $SDK_PATH -arch arm64 -DPLATFORM_IOS -DGRAPHICS_API_OPENGL_ES2"
        
        mkdir -p ../../platform/ios/libs
        cp libraylib.a ../../platform/ios/libs/

    - name: Bundle Assets
      run: |
        gcc tools/bin2c.c -o tools/bin2c
        gcc tools/gen_splash_bundle.c -o tools/gen_splash_bundle
        rm -f src/ui/components/assets_bundle.h
        echo "#ifndef ASSETS_BUNDLE_H" > src/ui/components/assets_bundle.h
        echo "#define ASSETS_BUNDLE_H" >> src/ui/components/assets_bundle.h
        ./tools/bin2c "assets/fonts/otfs/Font Awesome 5 Free-Solid-900.otf" src/ui/components/assets_bundle.h font_awesome_solid append
        ./tools/bin2c "assets/fonts/otfs/Font Awesome 5 Free-Regular-400.otf" src/ui/components/assets_bundle.h font_awesome_regular append
        ./tools/bin2c "assets/fonts/otfs/Font Awesome 5 Brands-Regular-400.otf" src/ui/components/assets_bundle.h font_awesome_brand append
        ./tools/bin2c "assets/splash.png" src/ui/components/assets_bundle.h unx_logo append
        ./tools/bin2c "assets/icons/crown.png" src/ui/components/assets_bundle.h icon_crown append
        ./tools/gen_splash_bundle assets/splash src/ui/components/splash_bundle_tmp.h
        cat src/ui/components/splash_bundle_tmp.h >> src/ui/components/assets_bundle.h
        echo "#endif" >> src/ui/components/assets_bundle.h

    - name: Compile XDJ-UNX for iOS
      run: |
        SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        mkdir -p build/ios/obj
        
        # Discover all C and C++ files, excluding Windows/Android specifics
        C_FILES=$(find src -name "*.c" | grep -v "midi_backend_win.c")
        CPP_FILES=$(find src -name "*.cpp" && find lib -name "*.cpp")
        
        # Compile C
        for f in $C_FILES; do
           obj="build/ios/obj/$(echo $f | tr '/' '_').o"
           echo "Compiling $f -> $obj"
           clang -target arm64-apple-ios14.0 -isysroot $SDK_PATH -Isrc -Isrc/core -Isrc/engine -Ilib -Iraylib-src/src -O2 -DPLATFORM_IOS -DKS_STR_ENCODING_NONE -c $f -o $obj
        done
        
        # Compile C++
        for f in $CPP_FILES; do
           obj="build/ios/obj/$(echo $f | tr '/' '_').o"
           echo "Compiling $f -> $obj"
           clang++ -target arm64-apple-ios14.0 -isysroot $SDK_PATH -Isrc -Isrc/core -Isrc/engine -Ilib -Ilib/kaitai -Ilib/rekordbox-metadata -Iraylib-src/src -O2 -DPLATFORM_IOS -std=c++17 -c $f -o $obj
        done
        
        # Link executable
        # Including CoreVideo as it is often required by Raylib's iOS backend
        clang++ -target arm64-apple-ios14.0 -isysroot $SDK_PATH \
          build/ios/obj/*.o \
          platform/ios/libs/libraylib.a \
          -framework UIKit -framework QuartzCore -framework CoreGraphics -framework CoreAudio -framework AudioToolbox -framework AVFoundation -framework CoreFoundation -framework OpenGLES -framework CoreVideo \
          -stdlib=libc++ \
          -o build/ios/xdjunx

    - name: Package IPA
      run: |
        mkdir -p Payload/xdjunx.app
        cp build/ios/xdjunx Payload/xdjunx.app/
        cp platform/ios/Info.plist Payload/xdjunx.app/
        mkdir -p Payload/xdjunx.app/assets
        cp -r assets/* Payload/xdjunx.app/assets/
        
        # Create dummy icons if they don't exist
        touch Payload/xdjunx.app/Icon.png
        
        zip -r xdjunx-unsigned.ipa Payload
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: XDJ-UNX-iOS-Unsigned
        path: xdjunx-unsigned.ipa
